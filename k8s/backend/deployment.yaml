apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: union
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # 이미지 태그: latest (릴리즈), dev (main 브랜치), v1.2.3 (버전 태그)
          # 실제 레지스트리 주소로 변경 필요
          # 예: ghcr.io/myorg/union-backend:latest
          #     registry.gitlab.com/myorg/union/backend:latest
          image: glcr.dmslab.re.kr/jung-geun/cephfs-mount/union-api:latest
          imagePullPolicy: Always
          command:
            [
              "uv",
              "run",
              "uvicorn",
              "app.main:app",
              "--host",
              "0.0.0.0",
              "--port",
              "8000",
              "--workers",
              "2",
            ]
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: union-config
                  key: APP_REDIS_URL
            - name: OS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: union-secrets
                  key: OS_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: union-secrets
                  key: SECRET_KEY
            - name: GITLAB_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: union-secrets
                  key: GITLAB_OIDC_CLIENT_SECRET
            - name: K3S_KUBECONFIG_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: union-secrets
                  key: K3S_KUBECONFIG_ENCRYPTION_KEY
          volumeMounts:
            - name: union-config-volume
              mountPath: /app/config.toml
              subPath: config.toml
          # startupProbe:
          #   httpGet:
          #     path: /api/health
          #     port: 8000
          #   initialDelaySeconds: 15
          #   periodSeconds: 3
          #   failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "1024Mi"
              cpu: "1"
      volumes:
        - name: union-config-volume
          configMap:
            name: union-config
            items:
              - key: config.toml
                path: config.toml
