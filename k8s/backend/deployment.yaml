apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: union
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: union-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          env:
            - name: OPENSTACK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: union-secrets
                  key: OPENSTACK_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: union-secrets
                  key: SECRET_KEY
          volumeMounts:
            - name: union-config-volume
              mountPath: /app/union.toml
              subPath: union.toml
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: union-config-volume
          configMap:
            name: union-config
            items:
              - key: union.toml
                path: union.toml
