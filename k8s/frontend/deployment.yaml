apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: union
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: union-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            # 실제 서비스 도메인으로 변경 필요
            - name: ORIGIN
              value: "http://union.example.com"
            # PUBLIC_API_BASE는 브라우저에서 직접 접근 가능한 URL이어야 합니다.
            # Ingress를 사용하는 경우 ORIGIN과 동일하게 설정합니다.
            - name: PUBLIC_API_BASE
              value: "http://union.example.com"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
