apiVersion: v1
kind: ConfigMap
metadata:
  name: union-config
  namespace: union
data:
  APP_REDIS_URL: "redis://redis.union.svc.cluster.local:6379/0"
  # 실제 서비스 도메인으로 변경 필요 (예: https://union.example.com)
  APP_ORIGIN: "http://union.example.com"
  union.toml: |
    # Union 통합 설정 파일
    [openstack]
    auth_url = "https://keystone.example.com/v3"
    project_name = "admin"
    project_domain_name = "Default"
    user_domain_name = "Default"
    region_name = "RegionOne"
    manila_endpoint = ""
    manila_share_network_id = ""
    manila_share_type = "cephfs"
    manila_nfs_share_type = "nfstype"

    # Ceph 모니터 (cloud-init CephFS 마운트용, 콤마 구분)
    ceph_monitors = "172.30.0.1:6789,172.30.0.2:6789,172.30.0.3:6789"

    [app]
    backend_port = 8000
    frontend_port = 3000
    # secret_key는 secret.yaml의 SECRET_KEY 환경변수로 주입됩니다

    # 사이트 표시 이름 및 설명
    site_name = "DMS Cloud"
    site_description = "DMSLAB의 OpenStack 기반 클라우드 플랫폼"

    # 로고 및 파비콘 경로 (frontend/static/ 기준)
    logo_path = "/logo.png"
    favicon_path = "/favicon.ico"

    # 프론트엔드 대시보드 자동 새로고침 간격 (밀리초)
    refresh_interval_ms = 5000

    [logging]
    rotation_type = "time"
    rotation_when = "midnight"
    backup_count = 10

    [cache]
    redis_url = "redis://redis.union.svc.cluster.local:6379/0"
    # TTL 티어 (초)
    ttl_fast = 15      # 인스턴스, 볼륨, 플로팅IP
    ttl_normal = 30    # 네트워크, 라우터, 대시보드
    ttl_slow = 60      # 키페어, 보안그룹
    ttl_static = 300   # 이미지, 플레이버, 토큰 검증

    [session]
    timeout_seconds = 3600
    warning_before_seconds = 300

    [nova]
    default_network_id = ""
    default_availability_zone = "nova"
    boot_volume_size_gb = 20
    upper_volume_size_gb = 50

    [gpu]
    # GPU 디바이스 맵 (vendor_id/device_id: lspci -nn 출력의 PCI ID)

