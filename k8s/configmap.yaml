    [services]
    magnum = false
    manila = true
    zun = true
    k3s = true

    [k3s]
    version = "v1.31.4+k3s1"
    server_flavor_id = ""
    default_agent_flavor_id = ""
    server_image_id = ""
    callback_base_url = "https://example.com/"
    # kubeconfig_encryption_key는 secret.yaml에서 주입됩니다
    boot_volume_size_gb = 30

    [cors]
    origins = "http://localhost:3000,http://127.0.0.1:3000"

    [gitlab_oidc]
    enabled = false
    gitlab_url = "https://gitlab.com"
    client_id = "CHANGE_ME"
    # client_secret은 secret.yaml의 GITLAB_OIDC_CLIENT_SECRET 환경변수로 주입됩니다
    idp_id = "gitlab"
    protocol_id = "openid"
    redirect_uri = "https://example.com/auth/gitlab/callback"
    scopes = "openid email profile read_user"
