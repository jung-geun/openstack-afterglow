apiVersion: v1
kind: Secret
metadata:
  name: union-secrets
  namespace: union
type: Opaque
stringData:
  # OpenStack 관리자 계정 비밀번호
  # config.toml [openstack] username 에 해당하는 계정의 비밀번호
  # Settings.os_password 필드 → 환경변수 OS_PASSWORD 로 읽힘
  OS_PASSWORD: "changeme-openstack-admin-password"

  # FastAPI 세션/JWT 서명용 시크릿 키
  # 생성 방법: python3 -c "import secrets; print(secrets.token_hex(32))"
  SECRET_KEY: "a3f8c2e1d4b7a9f0e5c3d2b1a4f7e8c9d0b3a6f1e2c5d4b7a8f9e0c1d2b3a4f5"
