# Run: kubectl create secret generic union-secrets \
#   --namespace=union \
#   --from-literal=OPENSTACK_PASSWORD=your-openstack-password \
#   --from-literal=SECRET_KEY=change-me-in-production-use-random-string
apiVersion: v1
kind: Secret
metadata:
  name: union-secrets
  namespace: union
type: Opaque
stringData:
  OPENSTACK_PASSWORD: "your-openstack-password"
  SECRET_KEY: "change-me-in-production-use-random-string"
