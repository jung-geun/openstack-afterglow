apiVersion: v1
kind: Secret
metadata:
  name: afterglow-secrets
  namespace: afterglow
type: Opaque
stringData:
  # OpenStack 관리자 계정 비밀번호
  # config.toml [openstack] username 에 해당하는 계정의 비밀번호
  OS_PASSWORD: "CHANGE_THIS_TO_ACTUAL_OPENSTACK_PASSWORD"

  # FastAPI 세션/JWT 서명용 시크릿 키
  # 생성: python3 -c "import secrets; print(secrets.token_hex(32))"
  SECRET_KEY: "RANDOM_GENERATED_64_CHAR_HEX_STRING_FOR_SECRET_KEY"

  # GitLab OIDC Client Secret
  GITLAB_OIDC_CLIENT_SECRET: "CHANGE_THIS_TO_ACTUAL_GITLAB_OIDC_CLIENT_SECRET"

  # k3s kubeconfig 암호화 키
  # 생성 방법: python3 -c "import secrets; print(secrets.token_hex(32))"
  K3S_KUBECONFIG_ENCRYPTION_KEY: "RANDOM_GENERATED_64_CHAR_HEX_STRING_FOR_KUBECONFIG_ENCRYPTION"

  DATABASE_URL: "mysql+asyncmy://afterglow:CHANGE_THIS_TO_ACTUAL_DB_PASSWORD@localhost/afterglow"