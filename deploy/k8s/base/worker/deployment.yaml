apiVersion: apps/v1
kind: Deployment
metadata:
  name: afterglow-worker
  namespace: afterglow
  labels:
    app: afterglow-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: afterglow-worker
  template:
    metadata:
      labels:
        app: afterglow-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/jung-geun/afterglow-api:latest
          imagePullPolicy: Always
          command:
            - "uv"
            - "run"
            - "python"
            - "-m"
            - "app.worker"
          env:
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: afterglow-config
                  key: APP_REDIS_URL
            - name: OS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: afterglow-secrets
                  key: OS_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: afterglow-secrets
                  key: SECRET_KEY
            - name: K3S_KUBECONFIG_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: afterglow-secrets
                  key: K3S_KUBECONFIG_ENCRYPTION_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: afterglow-secrets
                  key: DATABASE_URL
            # 헬스체크 주기 (초) — 기본 180s(3분)
            - name: K3S_HEALTH_INTERVAL
              value: "180"
          volumeMounts:
            - name: afterglow-config-volume
              mountPath: /app/config.toml
              subPath: config.toml
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: afterglow-config-volume
          configMap:
            name: afterglow-config
            items:
              - key: config.toml
                path: config.toml
