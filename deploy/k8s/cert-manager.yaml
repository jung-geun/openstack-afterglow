apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prd-traefik
spec:
  acme:
    # 실서비스용 (staging으로 먼저 테스트 권장)
    server: https://acme-v02.api.letsencrypt.org/directory
    email: your-email@example.com
    privateKeySecretRef:
      name: letsencrypt-prd-traefik
    solvers:
      - http01:
          ingress:
            class: traefik
