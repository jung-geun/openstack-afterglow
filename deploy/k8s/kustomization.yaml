apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - ingress.yaml
  - backend/deployment.yaml
  - backend/service.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - redis/deployment.yaml
  - redis/service.yaml

# 기본 매니페스트의 :latest 태그를 :dev 로 오버라이드
images:
  - name: ghcr.io/jung-geun/afterglow-api
    newTag: latest
  - name: ghcr.io/jung-geun/afterglow
    newTag: latest
