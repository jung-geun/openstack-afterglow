apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: afterglow
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # 이미지 태그: latest (릴리즈), dev (main 브랜치), v1.2.3 (버전 태그)
          # 실제 레지스트리 주소로 변경 필요
          # 예: ghcr.io/myorg/afterglow-api:latest
          #     registry.gitlab.com/myorg/afterglow/frontend:latest
          image: ghcr.io/jung-geun/afterglow:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # 실제 서비스 도메인으로 변경 필요
            - name: ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: afterglow-config
                  key: APP_ORIGIN
            # PUBLIC_API_BASE는 브라우저에서 직접 접근 가능한 URL
            # Ingress를 통해 /api 경로를 백엔드로 라우팅하는 경우 ORIGIN과 동일하게 설정
            - name: PUBLIC_API_BASE
              valueFrom:
                configMapKeyRef:
                  name: afterglow-config
                  key: APP_ORIGIN
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "500Mi"
              cpu: "100m"
            limits:
              memory: "1024Mi"
              cpu: "500m"
