apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: afterglow-ingress
  namespace: afterglow
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # kubernetes.io/ingress.class: nginx
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  # TLS 설정 (HTTPS 사용 시 주석 해제 후 설정)
  tls:
    - hosts:
        - test.cloud.dmslab.re.kr   # 실제 도메인으로 변경
      secretName: afterglow-tls         # cert-manager 또는 수동으로 생성한 TLS Secret 이름
  rules:
    - host: test.cloud.dmslab.re.kr # 실제 도메인으로 변경
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
