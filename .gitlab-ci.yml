stages:
  - test
  - build
  - secret-detection

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/afterglow-api"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/afterglow"

# ---------------------------------------------------------------------------
# Test
# ---------------------------------------------------------------------------

test-backend:
  image: ghcr.io/astral-sh/uv:python3.12-trixie
  stage: test
  before_script:
    - cd backend
    - uv sync --frozen --extra dev
  script:
    - uv run ruff check .
    - uv run ruff format --check .
    - AFTERGLOW_ALLOW_INSECURE=1 uv run python -m pytest tests/ -v --ignore=tests/integration
  cache:
    key: backend-${CI_COMMIT_REF_SLUG}
    paths:
      - backend/.venv/

test-frontend:
  image: oven/bun:1
  stage: test
  before_script:
    - cd frontend
    - bun install --frozen-lockfile
  script:
    - bun run test
  cache:
    key: frontend-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/node_modules/

# ---------------------------------------------------------------------------
# Docker Build (--cache-from 레지스트리 캐시)
# ---------------------------------------------------------------------------

.docker-build:
  image: docker:24.0.7
  services:
    - name: docker:24.0.7-dind
      alias: docker
  stage: build
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker buildx create --use --driver docker-container
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: "$CI_COMMIT_TAG =~ /^v/"

build-backend:
  extends: .docker-build
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="--tag $BACKEND_IMAGE:$CI_COMMIT_TAG --tag $BACKEND_IMAGE:latest"
      elif [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAGS="--tag $BACKEND_IMAGE:nightly"
      else
        TAGS="--tag $BACKEND_IMAGE:dev"
      fi
      docker buildx build \
        --target backend \
        --cache-from type=registry,ref=$BACKEND_IMAGE:cache \
        --cache-to type=registry,ref=$BACKEND_IMAGE:cache,mode=max \
        $TAGS \
        --push \
        .

build-frontend:
  extends: .docker-build
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="--tag $FRONTEND_IMAGE:$CI_COMMIT_TAG --tag $FRONTEND_IMAGE:latest"
      elif [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAGS="--tag $FRONTEND_IMAGE:nightly"
      else
        TAGS="--tag $FRONTEND_IMAGE:dev"
      fi
      docker buildx build \
        --target frontend \
        --cache-from type=registry,ref=$FRONTEND_IMAGE:cache \
        --cache-to type=registry,ref=$FRONTEND_IMAGE:cache,mode=max \
        $TAGS \
        --push \
        .

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------

sast:
  stage: test

secret_detection:
  stage: secret-detection

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
