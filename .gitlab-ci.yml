# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/user/application_security/sast/#available-cicd-variables
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure/
# Dependency Scanning customization: https://docs.gitlab.com/user/application_security/dependency_scanning/#customizing-analyzer-behavior
# Container Scanning customization: https://docs.gitlab.com/user/application_security/container_scanning/#customizing-analyzer-behavior
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ci/variables/#cicd-variable-precedence
stages:
  - build
  - test
  - deploy
  - review
  - dast
  - staging
  - canary
  - production
  - incremental rollout 10%
  - incremental rollout 25%
  - incremental rollout 50%
  - incremental rollout 100%
  - performance
  - cleanup
  - secret-detection

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  HEALTHCHECK_TCP_PORT: "2375"
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/union-api"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/union"

.docker-build:
  image: docker:24.0.7
  services:
    - name: docker:24.0.7-dind
      alias: docker
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: "$CI_COMMIT_TAG =~ /^v/"

build-backend:
  extends: .docker-build
  stage: build
  script:
    - docker build -t "$BACKEND_IMAGE:build-tmp" ./backend
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        # 버전 태그: latest + 버전 태그
        docker tag "$BACKEND_IMAGE:build-tmp" "$BACKEND_IMAGE:$CI_COMMIT_TAG"
        docker tag "$BACKEND_IMAGE:build-tmp" "$BACKEND_IMAGE:latest"
        docker push "$BACKEND_IMAGE:$CI_COMMIT_TAG"
        docker push "$BACKEND_IMAGE:latest"
      else
        # main 또는 MR: dev 태그만
        docker tag "$BACKEND_IMAGE:build-tmp" "$BACKEND_IMAGE:dev"
        docker push "$BACKEND_IMAGE:dev"
      fi

build-frontend:
  extends: .docker-build
  stage: build
  script:
    - docker build -t "$FRONTEND_IMAGE:build-tmp" ./frontend
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        # 버전 태그: latest + 버전 태그
        docker tag "$FRONTEND_IMAGE:build-tmp" "$FRONTEND_IMAGE:$CI_COMMIT_TAG"
        docker tag "$FRONTEND_IMAGE:build-tmp" "$FRONTEND_IMAGE:latest"
        docker push "$FRONTEND_IMAGE:$CI_COMMIT_TAG"
        docker push "$FRONTEND_IMAGE:latest"
      else
        # main 또는 MR: dev 태그만
        docker tag "$FRONTEND_IMAGE:build-tmp" "$FRONTEND_IMAGE:dev"
        docker push "$FRONTEND_IMAGE:dev"
      fi
sast:
  stage: test
include:
  - template: Auto-DevOps.gitlab-ci.yml
secret_detection:
  stage: secret-detection
