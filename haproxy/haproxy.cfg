global
    log stdout format raw local0 info
    maxconn 4096

resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 5s

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    option  forwardfor
    option  http-server-close

# HTTP → HTTPS 리다이렉트
frontend http_front
    bind *:80
    http-request redirect scheme https code 301 unless { ssl_fc }

# HTTPS 메인 프론트엔드
frontend https_front
    bind *:443 ssl crt /etc/haproxy/certs/union.pem ssl-min-ver TLSv1.2 ciphers ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20 ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    option httplog

    # Rate limiting: IP당 10초간 100 요청 초과 시 429
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }

    acl is_api path_beg /api/
    use_backend union_backend if is_api
    default_backend union_frontend

    # 보안 헤더
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-Frame-Options DENY
    http-response set-header Referrer-Policy strict-origin-when-cross-origin
    http-response set-header Permissions-Policy "camera=(), microphone=(), geolocation=()"
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains"

backend union_backend
    option httpchk GET /api/health
    server-template backend 1-4 backend:8000 check inter 10s resolvers docker init-addr libc,none

backend union_frontend
    option httpchk GET /health
    server-template frontend 1-4 frontend:3000 check inter 10s resolvers docker init-addr libc,none
