global
    log stdout format raw local0 info
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    option  forwardfor
    option  http-server-close

frontend http_front
    bind *:80
    option  httplog

    # Rate limiting: IP당 10초간 100 요청 초과 시 429
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }

    acl is_api path_beg /api/
    use_backend union_backend if is_api
    default_backend union_frontend

    # 보안 헤더
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-Frame-Options DENY
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Referrer-Policy strict-origin-when-cross-origin
    http-response set-header Permissions-Policy "camera=(), microphone=(), geolocation=()"

backend union_backend
    option  httpchk GET /api/health
    server  backend backend:8000 check inter 10s

backend union_frontend
    server  frontend frontend:3000 check inter 10s
