[project]
name = "union-backend"
version = "0.1.0"
description = "Union - OpenStack VM deployment platform"
requires-python = ">=3.12"
dependencies = [
    "fastapi==0.115.0",
    "uvicorn[standard]==0.30.6",
    "openstacksdk==3.3.0",
    "python-keystoneclient==5.4.0",
    "jinja2==3.1.4",
    "pydantic==2.9.2",
    "pydantic-settings==2.5.2",
    "python-multipart==0.0.12",
    "httpx==0.27.2",
    "aiofiles==24.1.0",
    "redis[hiredis]==5.0.0",
    "prometheus-client>=0.20.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = false
