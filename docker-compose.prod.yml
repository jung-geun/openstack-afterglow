# 프로덕션 환경용 docker-compose
# 사용법: docker compose -f docker-compose.prod.yml up -d
#
# 필수 환경 변수 (.env 파일 또는 셸에서 설정):
#   REGISTRY       - 컨테이너 레지스트리 주소 (예: ghcr.io/myorg)
#   IMAGE_TAG      - 이미지 태그 (예: latest, v1.2.3)
#   ORIGIN         - 프론트엔드 접근 URL (예: https://union.example.com)
#   PUBLIC_API_BASE - 백엔드 API URL (예: https://union.example.com)

services:
  redis:
    image: redis:7-alpine
    # 프로덕션: 포트를 호스트에 노출하지 않음 (내부 네트워크만 사용)
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: ${REGISTRY}/union-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./logs:/app/logs
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      - OPENSTACK_PASSWORD=${OPENSTACK_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - UNION_ENV=production
    depends_on:
      - redis
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    image: ${REGISTRY}/union-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - ORIGIN=${ORIGIN:-http://localhost:3000}
      - PUBLIC_API_BASE=${PUBLIC_API_BASE:-http://localhost:8000}
    depends_on:
      - backend
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── 프록시 프로필 (docker compose --profile proxy -f docker-compose.prod.yml up -d) ────────
  # HAProxy를 사용하면 80 포트 하나로 프론트(/)와 백엔드(/api/)를 모두 서빙
  # 환경변수: HAPROXY_BIND_PORT (기본 80), ORIGIN과 PUBLIC_API_BASE를 HAProxy 주소로 설정
  haproxy:
    image: haproxy:2.9-alpine
    profiles: ["proxy"]
    ports:
      - "${HAPROXY_BIND_PORT:-80}:80"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - frontend
      - backend
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── 모니터링 프로필 (docker compose --profile monitoring -f docker-compose.prod.yml up -d) ──

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    profiles: ["monitoring"]
    environment:
      - discovery.type=single-node
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:?OPENSEARCH_PASSWORD must be set}
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    profiles: ["monitoring"]
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      - opensearch
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.0.0
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  opensearch-data:
  prom-data:
  grafana-data:
